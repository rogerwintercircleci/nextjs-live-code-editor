version: 2.1

orbs:
  node: circleci/node@7.1.0

jobs:
  lint-and-test:
    executor:
      name: node/default
      tag: "22.13.1"
    steps:
      - checkout
      - run: npm ci
      - run: npm run format
      - run: npm run lint -- --fix
      - run: npm test

workflows:
  lint-and-test:
    jobs:
      - lint-and-test
